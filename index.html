<!DOCTYPE html>
<html>
<head>
<title>Roue</title>
<style>
body{
text-align:center;
font-family:Arial;
}

#wheel{
width:300px;
height:300px;
border-radius:50%;
margin:40px auto;
background:conic-gradient(
red 0deg 60deg,
blue 60deg 120deg,
green 120deg 180deg,
yellow 180deg 240deg,
orange 240deg 300deg,
purple 300deg 360deg
);
transition:transform 3s;
}

button{
padding:10px 20px;
font-size:20px;
}
</style>
</head>

<body>

<h1>Ma Roue 🎡</h1>

<div id="wheel"></div>

<button onclick="spin()">Tourner</button>

<script>
function spin(){
let wheel=document.getElementById("wheel");
let random=Math.floor(Math.random()*360)+720;
wheel.style.transform="rotate("+random+"deg)";
}
</script>

</body>
</html>
